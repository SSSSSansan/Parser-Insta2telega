name: ESG Parser

on:
  schedule:
    - cron: '*/30 * * * *'   # каждые 30 минут
  workflow_dispatch:          # чтобы можно было запускать вручную кнопкой

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run parser
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHANNEL_ID: ${{ secrets.TG_CHANNEL_ID }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_COOKIES_B64: ${{ secrets.IG_COOKIES_B64 }}
        run: python main.py

      - name: Save updated database back to repo
        run: |
          git config user.name "esg-bot"
          git config user.email "bot@users.noreply.github.com"
          git add posts.db
          git diff --staged --quiet || git commit -m "chore: update posts.db"
          git push